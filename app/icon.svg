<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Stacked wordmark: full/ over REFIT in a black square -->
  <rect width="512" height="512" fill="#121010"/>
  <!-- "full" in white, "/" in red -->
  <text x="80" y="238" font-family="system-ui, -apple-system, Helvetica Neue, sans-serif" font-weight="800" font-size="150" fill="#F2F0EE" letter-spacing="-4">full<tspan fill="#D43B2A">/</tspan></text>
  <!-- "REFIT" in white below -->
  <text x="72" y="388" font-family="system-ui, -apple-system, Helvetica Neue, sans-serif" font-weight="800" font-size="150" fill="#F2F0EE" letter-spacing="-2">REFIT</text>
</svg>
